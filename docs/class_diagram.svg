<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
</marker>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
<style>
text{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-size:13px}
.title{font-size:20px;font-weight:700}
.box{fill:#ffffff;stroke:#334155;stroke-width:1.4;rx:8;ry:8}
.soft{fill:#eef2ff;stroke:#475569;stroke-width:1.2;rx:8;ry:8}
.actor{fill:#ecfeff;stroke:#155e75;stroke-width:1.2;rx:18;ry:18}
.line{stroke:#1f2937;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
.dash{stroke:#334155;stroke-width:1.2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
.small{font-size:12px;fill:#334155}
</style>
<text x="30" y="40" class="title">Fake News Detector - UML Class Diagram</text>
<rect class="box" x="40" y="90" width="280" height="170"/>
<text x="52" y="114">FastAPIApp</text>
<line class="dash" x1="40" y1="122" x2="320" y2="122"/>
<text x="52" y="144" class="small">+analyze(req)</text>
<text x="52" y="162" class="small">+get_history()</text>
<text x="52" y="180" class="small">+get_analysis(id)</text>
<text x="52" y="198" class="small">+health()</text>
<rect class="box" x="380" y="90" width="300" height="170"/>
<text x="392" y="114">AnalysisEngine</text>
<line class="dash" x1="380" y1="122" x2="680" y2="122"/>
<text x="392" y="144" class="small">+run_analysis(req)</text>
<rect class="box" x="40" y="330" width="280" height="120"/>
<text x="52" y="354">AnalyzeRequest</text>
<line class="dash" x1="40" y1="362" x2="320" y2="362"/>
<text x="52" y="384" class="small">+type: InputType</text>
<text x="52" y="402" class="small">+content: str</text>
<rect class="box" x="380" y="330" width="330" height="200"/>
<text x="392" y="354">AnalyzeResponse</text>
<line class="dash" x1="380" y1="362" x2="710" y2="362"/>
<text x="392" y="384" class="small">+id: str</text>
<text x="392" y="402" class="small">+verdict: VerdictLabel</text>
<text x="392" y="420" class="small">+credibility_score: int</text>
<text x="392" y="438" class="small">+summary: str</text>
<rect class="box" x="780" y="330" width="280" height="120"/>
<text x="792" y="354">ModelScores</text>
<line class="dash" x1="780" y1="362" x2="1060" y2="362"/>
<text x="792" y="384" class="small">+label</text>
<text x="792" y="402" class="small">+confidence</text>
<text x="792" y="420" class="small">+sensationalism</text>
<rect class="box" x="780" y="470" width="280" height="120"/>
<text x="792" y="494">SourceCredibility</text>
<line class="dash" x1="780" y1="502" x2="1060" y2="502"/>
<text x="792" y="524" class="small">+domain</text>
<text x="792" y="542" class="small">+score</text>
<text x="792" y="560" class="small">+bias</text>
<text x="792" y="578" class="small">+tags</text>
<rect class="box" x="1100" y="330" width="280" height="120"/>
<text x="1112" y="354">FactCheckClaim</text>
<line class="dash" x1="1100" y1="362" x2="1380" y2="362"/>
<text x="1112" y="384" class="small">+text</text>
<text x="1112" y="402" class="small">+status</text>
<text x="1112" y="420" class="small">+source</text>
<text x="1112" y="438" class="small">+url?</text>
<rect class="box" x="1100" y="470" width="280" height="120"/>
<text x="1112" y="494">SignalPhrase</text>
<line class="dash" x1="1100" y1="502" x2="1380" y2="502"/>
<text x="1112" y="524" class="small">+text</text>
<text x="1112" y="542" class="small">+level</text>
<rect class="box" x="380" y="610" width="280" height="130"/>
<text x="392" y="634">NLPClassifier</text>
<line class="dash" x1="380" y1="642" x2="660" y2="642"/>
<text x="392" y="664" class="small">+classify_text()</text>
<text x="392" y="682" class="small">+extract_signal_phrases()</text>
<rect class="box" x="700" y="610" width="240" height="110"/>
<text x="712" y="634">FactChecker</text>
<line class="dash" x1="700" y1="642" x2="940" y2="642"/>
<text x="712" y="664" class="small">+check_claims()</text>
<rect class="box" x="980" y="610" width="320" height="110"/>
<text x="992" y="634">SourceCredibilityService</text>
<line class="dash" x1="980" y1="642" x2="1300" y2="642"/>
<text x="992" y="664" class="small">+score_domain()</text>
<rect class="box" x="1340" y="610" width="240" height="110"/>
<text x="1352" y="634">ArticleFetcher</text>
<line class="dash" x1="1340" y1="642" x2="1580" y2="642"/>
<text x="1352" y="664" class="small">+fetch_article()</text>
<rect class="box" x="1340" y="90" width="220" height="100"/>
<text x="1352" y="114">Cache</text>
<line class="dash" x1="1340" y1="122" x2="1560" y2="122"/>
<text x="1352" y="144" class="small">+get_cached()</text>
<text x="1352" y="162" class="small">+set_cached()</text>
<rect class="box" x="1600" y="330" width="180" height="140"/>
<text x="1612" y="354">AnalysisRecord</text>
<line class="dash" x1="1600" y1="362" x2="1780" y2="362"/>
<text x="1612" y="384" class="small">+id</text>
<text x="1612" y="402" class="small">+verdict</text>
<text x="1612" y="420" class="small">+credibility_score</text>
<line class="line" x1="320" y1="170" x2="380" y2="170"/>
<text x="354.0" y="166.0" class="small">uses</text>
<line class="line" x1="180" y1="260" x2="180" y2="330"/>
<text x="184.0" y="291.0" class="small">accepts</text>
<line class="line" x1="530" y1="260" x2="530" y2="330"/>
<text x="534.0" y="291.0" class="small">returns</text>
<line class="line" x1="680" y1="170" x2="1450" y2="140"/>
<text x="1069.0" y="151.0" class="small">cache</text>
<line class="line" x1="680" y1="170" x2="1690" y2="330"/>
<text x="1189.0" y="246.0" class="small">stores</text>
<line class="line" x1="530" y1="530" x2="520" y2="610"/>
<text x="529.0" y="566.0" class="small">calls</text>
<line class="line" x1="560" y1="530" x2="800" y2="610"/>
<text x="684.0" y="566.0" class="small">calls</text>
<line class="line" x1="620" y1="530" x2="1140" y2="610"/>
<text x="884.0" y="566.0" class="small">calls</text>
<line class="line" x1="680" y1="530" x2="1460" y2="610"/>
<text x="1074.0" y="566.0" class="small">calls</text>
<line class="line" x1="710" y1="390" x2="780" y2="390"/>
<text x="749.0" y="386.0" class="small">has</text>
<line class="line" x1="710" y1="500" x2="780" y2="530"/>
<text x="749.0" y="511.0" class="small">has</text>
<line class="line" x1="710" y1="420" x2="1100" y2="390"/>
<text x="909.0" y="401.0" class="small">has*</text>
<line class="line" x1="710" y1="510" x2="1100" y2="530"/>
<text x="909.0" y="516.0" class="small">has*</text>
</svg>

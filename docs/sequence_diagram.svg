<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="980" viewBox="0 0 1880 980">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
</marker>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
<style>
text{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-size:13px}
.title{font-size:20px;font-weight:700}
.box{fill:#ffffff;stroke:#334155;stroke-width:1.4;rx:8;ry:8}
.soft{fill:#eef2ff;stroke:#475569;stroke-width:1.2;rx:8;ry:8}
.actor{fill:#ecfeff;stroke:#155e75;stroke-width:1.2;rx:18;ry:18}
.line{stroke:#1f2937;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
.dash{stroke:#334155;stroke-width:1.2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
.small{font-size:12px;fill:#334155}
</style>
<text x="30" y="40" class="title">Fake News Detector - UML Sequence Diagram</text>
<rect class="soft" x="25" y="80" width="110" height="40"/>
<text x="45" y="106">User</text>
<line class="dash" x1="80" y1="120" x2="80" y2="920"/>
<rect class="soft" x="225" y="80" width="110" height="40"/>
<text x="245" y="106">Frontend</text>
<line class="dash" x1="280" y1="120" x2="280" y2="920"/>
<rect class="soft" x="445" y="80" width="110" height="40"/>
<text x="465" y="106">API</text>
<line class="dash" x1="500" y1="120" x2="500" y2="920"/>
<rect class="soft" x="645" y="80" width="110" height="40"/>
<text x="665" y="106">Cache</text>
<line class="dash" x1="700" y1="120" x2="700" y2="920"/>
<rect class="soft" x="855" y="80" width="110" height="40"/>
<text x="875" y="106">AnalysisEngine</text>
<line class="dash" x1="910" y1="120" x2="910" y2="920"/>
<rect class="soft" x="1065" y="80" width="110" height="40"/>
<text x="1085" y="106">NLP</text>
<line class="dash" x1="1120" y1="120" x2="1120" y2="920"/>
<rect class="soft" x="1245" y="80" width="110" height="40"/>
<text x="1265" y="106">FactChecker</text>
<line class="dash" x1="1300" y1="120" x2="1300" y2="920"/>
<rect class="soft" x="1435" y="80" width="110" height="40"/>
<text x="1455" y="106">SourceCred</text>
<line class="dash" x1="1490" y1="120" x2="1490" y2="920"/>
<rect class="soft" x="1625" y="80" width="110" height="40"/>
<text x="1645" y="106">DB</text>
<line class="dash" x1="1680" y1="120" x2="1680" y2="920"/>
<line class="line" x1="80" y1="160" x2="280" y2="160"/>
<text x="125.0" y="154" class="small">enter input + click analyze</text>
<line class="line" x1="280" y1="210" x2="500" y2="210"/>
<text x="335.0" y="204" class="small">POST /api/analyze</text>
<line class="line" x1="500" y1="250" x2="700" y2="250"/>
<text x="545.0" y="244" class="small">get_cached(key)</text>
<line class="dash" x1="700" y1="290" x2="500" y2="290"/>
<text x="545.0" y="284" class="small">cache miss/hit</text>
<line class="line" x1="500" y1="340" x2="910" y2="340"/>
<text x="650.0" y="334" class="small">run_analysis(req)</text>
<line class="line" x1="910" y1="390" x2="1120" y2="390"/>
<text x="960.0" y="384" class="small">classify_text</text>
<line class="dash" x1="1120" y1="430" x2="910" y2="430"/>
<text x="960.0" y="424" class="small">NLPResult</text>
<line class="line" x1="910" y1="470" x2="1120" y2="470"/>
<text x="960.0" y="464" class="small">extract_signal_phrases</text>
<line class="dash" x1="1120" y1="510" x2="910" y2="510"/>
<text x="960.0" y="504" class="small">SignalPhrase[]</text>
<line class="line" x1="910" y1="550" x2="1300" y2="550"/>
<text x="1050.0" y="544" class="small">check_claims</text>
<line class="dash" x1="1300" y1="590" x2="910" y2="590"/>
<text x="1050.0" y="584" class="small">FactCheckResult[]</text>
<line class="line" x1="910" y1="630" x2="1490" y2="630"/>
<text x="1145.0" y="624" class="small">score_domain</text>
<line class="dash" x1="1490" y1="670" x2="910" y2="670"/>
<text x="1145.0" y="664" class="small">CredibilityResult</text>
<line class="dash" x1="910" y1="710" x2="500" y2="710"/>
<text x="650.0" y="704" class="small">AnalyzeResponse</text>
<line class="line" x1="500" y1="750" x2="1680" y2="750"/>
<text x="1035.0" y="744" class="small">INSERT AnalysisRecord</text>
<line class="line" x1="500" y1="790" x2="700" y2="790"/>
<text x="545.0" y="784" class="small">set_cached(key,response)</text>
<line class="dash" x1="500" y1="830" x2="280" y2="830"/>
<text x="335.0" y="824" class="small">200 AnalyzeResponse</text>
<line class="dash" x1="280" y1="870" x2="80" y2="870"/>
<text x="125.0" y="864" class="small">rendered verdict + history</text>
</svg>
